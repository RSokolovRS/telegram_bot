server {
    listen 80;
    server_name sokolrock.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sokolrock.org;

    ssl_certificate /etc/letsencrypt/live/sokolrock.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokolrock.org/privkey.pem;

    client_max_body_size 10m;
    resolver 127.0.0.11 valid=30s;

    location /api/ {
        proxy_http_version 1.1;
        proxy_pass http://app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_http_version 1.1;
        proxy_pass http://app:8000/health;
        proxy_set_header Host $host;
    }

    location /sub/ {
        set $sui_upstream s-ui:2096;
        proxy_http_version 1.1;
        proxy_pass http://$sui_upstream/sub/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
