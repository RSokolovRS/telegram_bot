services:
  app:
    build: .
    container_name: vpnbot_app_staging
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - postgres
    networks:
      - backend

  postgres:
    image: postgres:16
    container_name: vpnbot_postgres_staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: vpnbot_nginx_staging
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./deploy/nginx/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www_staging:/var/www/certbot
      - certbot_conf_staging:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - backend

  certbot:
    image: certbot/certbot:latest
    container_name: vpnbot_certbot_staging
    volumes:
      - certbot_www_staging:/var/www/certbot
      - certbot_conf_staging:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h;
      done"
    networks:
      - backend

volumes:
  postgres_staging_data:
  certbot_www_staging:
  certbot_conf_staging:

networks:
  backend:
    driver: bridge
